name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - staging
      - Dev
      - "init/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: allaboard
          POSTGRES_PASSWORD: allaboard
          POSTGRES_DB: allaboard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U allaboard -d allaboard_test"
          --health-interval 4s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://allaboard:allaboard@127.0.0.1:5432/allaboard_test
      JWT_SECRET: ci-test-jwt-secret-min-32-chars-long!!
      MVP_LOGIN_PASSWORD: ci-test-login-password
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: API database migrations
        run: pnpm --filter api run db:migrate

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
