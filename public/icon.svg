<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.9"/>
    </linearGradient>
  </defs>

  <!-- Voile gauche (premier A) — triangle élancé -->
  <polygon
    points="160,320 200,100 280,320"
    fill="url(#grad)"
  />

  <!-- Voile droite (second A) — triangle plus large -->
  <polygon
    points="240,320 310,130 390,320"
    fill="url(#grad2)"
  />

  <!-- Barre transversale gauche (traverse du A) -->
  <rect x="175" y="245" width="90" height="14" rx="7" fill="url(#grad)"/>

  <!-- Barre transversale droite (traverse du A) -->
  <rect x="258" y="260" width="100" height="14" rx="7" fill="url(#grad2)"/>

  <!-- Mât central -->
  <rect x="246" y="95" width="12" height="230" rx="6" fill="url(#grad)"/>

  <!-- Coque — ligne élégante -->
  <path
    d="M100,355 Q256,400 412,355 L400,380 Q256,430 112,380 Z"
    fill="url(#grad)"
  />

  <!-- Reflet eau -->
  <ellipse cx="256" cy="420" rx="160" ry="10" fill="#6366f1" opacity="0.2"/>
</svg>
