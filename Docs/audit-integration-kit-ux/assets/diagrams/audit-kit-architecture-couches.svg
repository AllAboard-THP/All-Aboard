<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="600" y="48" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="28" font-weight="600">Layers: apps -&gt; kit -&gt; foundations</text>
  <text x="600" y="78" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="14">AllAboard kit UX audit - regenerated 2026-05-13</text>

  <text x="60" y="130" fill="#a5b4fc" font-family="system-ui,sans-serif" font-size="16" font-weight="600">Applications</text>
  <rect x="60" y="145" width="340" height="100" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
  <text x="230" y="195" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="18" font-weight="600">apps/thp-final</text>
  <text x="230" y="220" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="13">Rails, ERB, Hotwire, React (chat)</text>
  <rect x="430" y="145" width="340" height="100" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="195" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="18" font-weight="600">apps/web</text>
  <text x="600" y="220" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="13">Next, Tailwind npm, BFF feed</text>
  <rect x="800" y="145" width="340" height="100" rx="12" fill="#1e293b" stroke="#64748b" stroke-width="2" filter="url(#shadow)"/>
  <text x="970" y="195" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="18" font-weight="600">apps/api</text>
  <text x="970" y="220" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="13">No UI</text>

  <text x="60" y="310" fill="#a5b4fc" font-family="system-ui,sans-serif" font-size="16" font-weight="600">Kit UX (target)</text>
  <rect x="60" y="325" width="1080" height="110" rx="12" fill="#1e293b" stroke="#ec4899" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="365" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="18" font-weight="600">Primitives, semantic tokens, rules (glass, type, a11y)</text>
  <text x="600" y="395" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="14">ERB partials + Tailwind; scoped CSS (chat); optional ui-tokens / D1 showcase</text>

  <text x="60" y="490" fill="#a5b4fc" font-family="system-ui,sans-serif" font-size="16" font-weight="600">Foundations</text>
  <rect x="60" y="505" width="1080" height="110" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="545" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="18" font-weight="600">Tailwind npm build, :root / theme.extend, application.css, CI (pnpm verify)</text>
  <text x="600" y="575" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="14">Build decision in plan; Next alignment (D3) at closure</text>

  <line x1="600" y1="245" x2="600" y2="325" stroke="#475569" stroke-width="2" stroke-dasharray="8 6"/>
  <line x1="600" y1="435" x2="600" y2="505" stroke="#475569" stroke-width="2" stroke-dasharray="8 6"/>
</svg>
